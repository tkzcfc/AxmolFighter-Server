syntax = "proto3";

package PB.Game;

option optimize_for = LITE_RUNTIME;

// 登录。
message LoginReq {
    enum MsgId { None = 0; Id = 1000; }
    string account = 1;
    string password = 2;
}

message LoginResp {
    enum MsgId { None = 0; Id = 1001; }
    int32 code = 1;
    string message = 2;
    int64 player_id = 3;
    string nickname = 4;
    ServerConfig server_config = 5;
    AccountInfo account_info = 6;
}

// 注册。
message RegisterReq {
    enum MsgId { None = 0; Id = 1002; }
    string account = 1;
    string password = 2;
    string nickname = 3;
}

message RegisterResp {
    enum MsgId { None = 0; Id = 1003; }
    int32 code = 1;
    string message = 2;
    int64 player_id = 3;
}

// 登录后下发的服务器配置。
message ServerConfig {
    int32 max_character_count = 1;
}

message AccountInfo {
    int64 player_id = 1;
    string account = 2;
    string nickname = 3;
}

message EnchantProp {
    int32 attr_id = 1;
    int32 value = 2;
}

message EquipmentInfo {
    int64 id = 1;
    int64 config_id = 2;
    int32 enhance_level = 3;
    int32 refine_level = 4;
    repeated EnchantProp enchant_props = 5;
    int32 slot = 6;
}

message ItemInfo {
    int64 id = 1;
    int64 config_id = 2;
    int32 count = 3;
}

message InventoryInfo {
    repeated ItemInfo items = 1;
    repeated EquipmentInfo equipments = 2;
}

message CharacterInfo {
    int64 character_id = 1;
    string name = 2;
    int32 class_id = 3;
    int32 gender = 4;
    int32 level = 5;
    int64 exp = 6;
    int64 gold = 7;
}

message PlayerInfo {
    enum MsgId { None = 0; Id = 1100; }
    int64 player_id = 1;
    string nickname = 2;
    int32 level = 3;
    int64 exp = 4;
}

// 创建角色。
message CreateCharacterReq {
    enum MsgId { None = 0; Id = 1200; }
    string name = 1;
    int32 class_id = 2;
    int32 gender = 3;
}

message CreateCharacterResp {
    enum MsgId { None = 0; Id = 1201; }
    int32 code = 1;
    string message = 2;
    CharacterInfo character = 3;
}

// 拉取角色列表。
message FetchCharacterListReq {
    enum MsgId { None = 0; Id = 1202; }
}

message FetchCharacterListResp {
    enum MsgId { None = 0; Id = 1203; }
    int32 code = 1;
    string message = 2;
    repeated CharacterInfo characters = 3;
}

// 选择角色进入游戏。
message SelectCharacterReq {
    enum MsgId { None = 0; Id = 1204; }
    int64 character_id = 1;
}

message SelectCharacterResp {
    enum MsgId { None = 0; Id = 1205; }
    int32 code = 1;
    string message = 2;
    CharacterInfo character = 3;
    InventoryInfo inventory = 4;
}

// 帧同步里用到的玩家状态。
message PlayerState {
    enum MsgId { None = 0; Id = 20000; }
    int64 player_id = 1;
    float pos_x = 2;
    float pos_y = 3;
    int32 hp = 4;
    string state = 5;
}

// 客户端请求进入副本战斗。
message BattleJoinReq {
    enum MsgId { None = 0; Id = 20010; }
    int64 player_id = 1;
    int32 map_id = 2;
}

message BattleJoinResp {
    enum MsgId { None = 0; Id = 20011; }
    int32 code = 1;
    string message = 2;
    uint32 battle_id = 3;
    uint32 server_frame = 4;
    bytes world_dump = 5;
}

message BattlePlayerSpec {
    uint32 session_id = 1;
    int64 player_id = 2;
}

// Game 发给 Battle，要求创建一场战斗。
message BattleCreateReq {
    enum MsgId { None = 0; Id = 20014; }
    uint32 battle_id = 1;
    int32 map_id = 2;
    repeated BattlePlayerSpec players = 3;
    // 旧字段暂时保留，跨服来源以 ForwardToServerReq 为准。
    uint32 requester_service_id = 4;
    uint32 requester_instance_id = 5;
}

message BattleCreateResp {
    enum MsgId { None = 0; Id = 20015; }
    int32 code = 1;
    string message = 2;
    uint32 battle_id = 3;
    uint32 battle_instance_id = 4;
    uint32 server_frame = 5;
    bytes world_dump = 6;
}

message BattleInputPush {
    enum MsgId { None = 0; Id = 20012; }
    uint32 battle_id = 1;
    uint32 client_frame = 2;
    uint32 input_mask = 3;
    uint64 client_time_ms = 4;
}

message BattleSnapshotPush {
    enum MsgId { None = 0; Id = 20013; }
    uint32 battle_id = 1;
    uint32 server_frame = 2;
    uint64 server_time_ms = 3;
    bytes world_dump = 4;
}